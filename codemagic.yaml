workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play # Group for Google Play credentials if needed
      vars:
        PACKAGE_NAME: "com.rajguru.app"
      node: latest
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - dyhghhb1@gmail.com # User's email from context

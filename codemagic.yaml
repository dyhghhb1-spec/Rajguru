workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play # Group for Google Play credentials if needed
      vars:
        PACKAGE_NAME: "com.rajguru.app"
        RELEASE_STORE_FILE: "rajguru.keystore"
        RELEASE_KEY_ALIAS: "rajguru@apk"
        RELEASE_STORE_PASSWORD: "rajguru123"
        RELEASE_KEY_PASSWORD: "rajguru123"
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Update App Icon and Splash
        script: |
          node scripts/update-icon.js
          npx -y @capacitor/assets generate --android --assetPath assets
          node scripts/force-android-icons.js
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Generate Keystore if missing
        script: |
          if [ ! -f android/app/rajguru.keystore ]; then
            echo "Generating temporary keystore..."
            keytool -genkey -v -keystore android/app/rajguru.keystore -alias "rajguru@apk" -keyalg RSA -keysize 2048 -validity 10000 -storepass "rajguru123" -keypass "rajguru123" -dname "CN=Rajguru, OU=App, O=Rajguru, L=Delhi, S=Delhi, C=IN"
          fi
      - name: Build Android APK
        script: |
          cd android
          gradle clean assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dyhghhb1@gmail.com # User's email from context
